name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Only run when @claude is mentioned
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Allow Claude to push commits back to the branch
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          # Custom instructions for this project
          custom_instructions: |
            You are working on MultivoHub — a career management SaaS app.
            Tech stack: React + TypeScript (Vite) frontend, Express + tRPC backend, Drizzle ORM + MySQL.
            Rules:
            - All text must be in English GB (British English, not American)
            - Never commit directly to main or copilot/* branches
            - Work on the claude/improvements branch or create claude/<topic> branches
            - Backend deploy: rsync to /root/project/backend/dist/ then pm2 restart jobapp-server
            - Frontend deploy: rsync to /var/www/multivohub/
