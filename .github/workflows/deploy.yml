# Multivohub-jobapp — production deploy
#
# Ops notes:
# - Success step prints github.ref_name so the log shows which branch was deployed.
# - Same production VPS targets as the old main-based flow: /var/www/multivohub/,
#   /root/project/backend/dist/, pm2 restart jobapp-server.
# - A real staging environment would need different paths and/or a separate workflow.
# - Repository secrets (VITE_* including VITE_CLERK_PUBLISHABLE_KEY, etc.) must be configured; the deploy job expects a
#   self-hosted runner with labels: self-hosted, linux, x64, production (see runs-on).

name: Deploy — multivohub-jobapp

on:
  push:
    branches:
      - claude/improvements
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time to the same VPS paths.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  # ─── 1. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate ENV schema
        run: node lib/envSchema.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Build frontend
        run: npm run build:frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_STRIPE_PRO_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}
          VITE_STRIPE_AUTOPILOT_PRICE_ID: ${{ secrets.VITE_STRIPE_AUTOPILOT_PRICE_ID }}
          VITE_COINBASE_PRO_LINK: ${{ secrets.VITE_COINBASE_PRO_LINK }}
          VITE_COINBASE_AUTOPILOT_LINK: ${{ secrets.VITE_COINBASE_AUTOPILOT_LINK }}

      - name: Build backend
        run: npm run build:backend
        env:
          # Same Clerk publishable key as the SPA (pk_…); backend reads it at runtime on the VPS.
          CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

      - name: Upload scripts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-scripts
          path: scripts/
          retention-days: 7

  # ─── 2. Deploy (self-hosted runner on VPS) ──────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: [self-hosted, linux, x64, production]
    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/frontend-dist/

      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: /tmp/backend-dist/

      - name: Download scripts
        uses: actions/download-artifact@v4
        with:
          name: deploy-scripts
          path: /root/project/scripts/

      - name: Make scripts executable
        run: chmod +x /root/project/scripts/*.sh

      - name: Backup current deployment
        run: |
          bash /root/project/scripts/backup.sh
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "⚠️ Backup exited with code ${EXIT_CODE} — continuing deploy without backup."
          fi
          exit 0

      - name: Deploy frontend → /var/www/multivohub
        run: |
          rsync -az --delete /tmp/frontend-dist/ /var/www/multivohub/

      - name: Deploy backend → /root/project/backend/dist
        run: |
          rsync -az --delete /tmp/backend-dist/ /root/project/backend/dist/

      - name: Restart backend (PM2)
        env:
          HOME: /root
        run: |
          pm2 restart jobapp-server && pm2 save

      - name: Smoke test
        env:
          HOME: /root
        run: |
          bash /root/project/scripts/smoke-test.sh

      - name: Notify success
        if: success()
        run: echo "✅ Deploy complete (${{ github.ref_name }}) — $(date -u '+%Y-%m-%d %H:%M UTC')"
