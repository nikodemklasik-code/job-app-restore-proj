name: Deploy — multivohub-jobapp

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── 1. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_STRIPE_PRO_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}
          VITE_STRIPE_AUTOPILOT_PRICE_ID: ${{ secrets.VITE_STRIPE_AUTOPILOT_PRICE_ID }}
          VITE_COINBASE_PRO_LINK: ${{ secrets.VITE_COINBASE_PRO_LINK }}
          VITE_COINBASE_AUTOPILOT_LINK: ${{ secrets.VITE_COINBASE_AUTOPILOT_LINK }}

      - name: Build backend
        run: npm run build:backend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

  # ─── 2. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend → /var/www/multivohub
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            frontend/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/multivohub/

      - name: Deploy backend → /root/project/backend/dist
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            backend/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/project/backend/dist/

      - name: Restart backend (PM2)
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "pm2 restart jobapp-server && pm2 save"

      - name: Smoke test
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "bash /root/project/scripts/smoke-test.sh"

      - name: Notify success
        if: success()
        run: echo "✅ Deploy complete — $(date -u '+%Y-%m-%d %H:%M UTC')"
