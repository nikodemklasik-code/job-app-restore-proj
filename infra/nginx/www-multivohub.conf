# Nginx site config — www.multivohub.com (static landing page)
# Install: ln -s /var/www/multivohub-jobapp/infra/nginx/www-multivohub.conf \
#                /etc/nginx/sites-enabled/www-multivohub
# SSL:     certbot --nginx -d multivohub.com -d www.multivohub.com
# Test:    nginx -t && systemctl reload nginx

# Redirect bare domain → www
server {
    listen 80;
    listen 443 ssl http2;
    server_name multivohub.com;

    ssl_certificate     /etc/letsencrypt/live/multivohub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/multivohub.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.multivohub.com$request_uri;
}

# HTTP → HTTPS redirect for www
server {
    listen 80;
    server_name www.multivohub.com;
    return 301 https://www.multivohub.com$request_uri;
}

# Main www vhost
server {
    listen 443 ssl http2;
    server_name www.multivohub.com;

    ssl_certificate     /etc/letsencrypt/live/multivohub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/multivohub.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()";

    root /var/www/multivohub-jobapp/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Block dotfiles
    location ~ /\. { deny all; }
}
