# Nginx site config — jobapp.multivohub.com
# Install: ln -s /var/www/multivohub-jobapp/infra/nginx/multivohub-jobapp.conf \
#                /etc/nginx/sites-enabled/multivohub-jobapp
# Test:    nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name jobapp.multivohub.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jobapp.multivohub.com;

    # SSL — managed by Certbot (run: certbot --nginx -d jobapp.multivohub.com)
    ssl_certificate     /etc/letsencrypt/live/jobapp.multivohub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobapp.multivohub.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()";

    # ── Frontend (Vite SPA) ──────────────────────────────────────────────────
    root /var/www/multivohub-jobapp/frontend/dist;
    index index.html;

    # Cache hashed assets forever; do NOT cache index.html
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all non-API, non-asset routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Backend API (Express/tRPC on port 3001) ──────────────────────────────
    location /trpc/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Allow larger body for CV uploads (10 MB)
        client_max_body_size 10M;
    }

    # Stripe webhooks — larger timeout, no rate-limit override needed
    location /webhooks/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check endpoint
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        access_log off;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
    }
}
