version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: multivohub-jobapp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: multivohub_jobapp
      MYSQL_USER: multivohub
      MYSQL_PASSWORD: multivohub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  mysql_data:
