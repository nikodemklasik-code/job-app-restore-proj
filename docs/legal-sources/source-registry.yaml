# Legal Hub Search — source of truth for approved source groups.
# Consumed by backend legal-hub-search (scope router) and tooling; do not fork ad hoc lists in code.
#
# Fields:
#   key                 — stable machine id
#   label               — UI + PDF copy
#   source_type         — category for routing / prompts
#   approved            — if false, must never be queried
#   default_enabled     — initial toggle when user first opens search
#   optional_secondary  — true = allowed only as “optional approved” layer, not core-only default
#   jurisdiction        — e.g. UK
#   legal_domain        — primary domain tag
#   update_cadence      — human/process hint for content ops (not a cron by itself)
#   paths               — repo-relative directories for curated material

version: 1
updated: '2026-04-17'
notes: >
  Paths are under docs/legal-sources/. Populate each directory with curated excerpts,
  official PDFs, or pointers per content ops. Empty dirs are placeholders until content lands.
  Default-enabled flags align with docs/features/legal-hub-search-full-implementation-spec-v1.0.md §4
  (core includes EAT / appeal tribunal decisions).

source_groups:
  - key: primary_law
    label: Primary Law
    source_type: legislation
    approved: true
    default_enabled: true
    optional_secondary: false
    jurisdiction: UK
    legal_domain: employment
    update_cadence: on_statute_change_or_quarterly_review
    paths:
      - docs/legal-sources/legislation/

